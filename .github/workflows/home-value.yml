name: Home Value

on:
  workflow_dispatch:

  #schedule:
    # Every other Monday at 8:00 AM UTC
    # GitHub doesn't support biweekly schedules natively.
    # This runs every Monday and the Python app should
    # determine whether it's an "update week".
    #- cron: "0 8 * * 1"

jobs:
  home-value:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Install Playwright
        run: |
          playwright install --with-deps chromium

      - name: Run Home Value App
        env:
          HOME_URL: ${{ secrets.HOME_URL }}
          VESTABOARD_API_KEY: ${{ secrets.VESTABOARD_API_KEY }}
        run: |
          python -m app.home_value.home_value

      - name: Upload scraper debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            debug.html
            debug.txt
            debug.png
