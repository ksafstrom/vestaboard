name: Run Weather Pokemon

on:
  schedule:
    - cron: "0 14 * * *"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-app:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run application
        env:
          PYTHONPATH: ${{ github.workspace }}
          VESTABOARD_RW_KEY: ${{ secrets.VESTABOARD_RW_KEY }}
          VESTABOARD_SANDBOX_RW_KEY: ${{ secrets.VESTABOARD_SANDBOX_RW_KEY }}
          VESTABOARD_WEATHER_KEY: ${{ secrets.VESTABOARD_WEATHER_KEY }}
        run: |
          echo "PYTHONPATH=$PYTHONPATH"
          echo "Starting application..."
          python -V
          python -m app.weather.weather
          echo "Application finished with exit code $?"

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: output.log
          if-no-files-found: ignore
